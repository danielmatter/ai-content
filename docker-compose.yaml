services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
      - SQLITE_PATH=/app/studio.sqlite
      - OPENROUTER_SITE_URL=${OPENROUTER_SITE_URL:-http://localhost:3001}
    volumes:
      - ./studio.sqlite:/app/studio.sqlite
      - ./storage:/app/storage
    restart: always

# Ensure the SQLite file and storage directory exist on the host before running
# or they will be created as directories by Docker.
